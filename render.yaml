services:
- type: web
  name: wordpress
  env: docker
  plan: pro
  region: singapore
  autoDeploy: true
  disk:
    name: wordpress
    mountPath: /mnt/wp-content
    sizeGB: 20
  envVars:
  - key: WORDPRESS_DB_HOST
    fromService:
      name: mysql-wordpress
      type: pserv
      property: host
  - key: WORDPRESS_DB_NAME
    fromService:
      name: mysql-wordpress
      type: pserv
      envVarKey: MYSQL_DATABASE
  - key: WORDPRESS_DB_USER
    fromService:
      name: mysql-wordpress
      type: pserv
      envVarKey: MYSQL_USER
  - key: WORDPRESS_DB_PASSWORD
    fromService:
      name: mysql-wordpress
      type: pserv
      envVarKey: MYSQL_PASSWORD
  - key: WORDPRESS_TABLE_PREFIX
    value: a6_
  - key: WORDPRESS_CONFIG_EXTRA
    value: "define('FS_METHOD','direct'); define('WP_HOME','https://aeoc.in'); define('WP_SITEURL','https://aeoc.in');"
- type: pserv
  name: mysql-wordpress
  repo: https://github.com/render-examples/mysql.git
  env: docker
  plan: standard
  region: singapore
  autoDeploy: false
  disk:
    name: mysql-wordpress
    mountPath: /var/lib/mysql
    sizeGB: 20
  envVars:
  - key: MYSQL_DATABASE
    value: mysql
  - key: MYSQL_USER
    value: mysql
  - key: MYSQL_PASSWORD
    generateValue: true
  - key: MYSQL_ROOT_PASSWORD
    generateValue: true
